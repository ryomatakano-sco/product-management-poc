<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SCO 商品管理 — paylight X</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;900&display=swap">

  <style>
    /* paylight X — Design Tokens (inline so we don't need a build step) */
    :root {
      --color-primary: #1AA68A;
      --color-primary-dark: #0E8A72;
      --color-primary-light: #E6F7F2;
      --color-primary-50: #F4FBF8;
      --color-accent-blue: #2EA7E0;
      --color-text: #1F2937;
      --color-text-muted: #6B7280;
      --color-text-subtle: #9CA3AF;
      --color-bg: #FFFFFF;
      --color-surface: #F8FAF9;
      --color-border: #E5E7EB;
      --color-warn: #D97706;
      --color-warn-bg: #FEF3C7;

      --font-sans: "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      --font-mono: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    * { box-sizing: border-box; }
    html, body, #root { height: 100%; margin: 0; }
    body {
      font-family: var(--font-sans);
      color: var(--color-text);
      background: var(--color-surface);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, h4 { margin: 0; line-height: 1.3; font-weight: 700; }
    button, input, select, textarea { font-family: inherit; }
    a { color: inherit; }

    @keyframes plxspin {
      from { transform: rotate(0); }
      to { transform: rotate(360deg); }
    }

    /* Loading splash, replaced once React mounts */
    .boot {
      display: flex; align-items: center; justify-content: center;
      height: 100%; color: var(--color-text-muted); font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="root"><div class="boot">読み込み中…</div></div>

  <!-- React + Babel from CDN (dev builds — fine for PoC) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.7/babel.min.js" crossorigin></script>

  <!--
    Barcode scanner. html5-qrcode supports EAN-13 / JAN-13 / EAN-8 / Code128
    via getUserMedia + a built-in WASM decoder. Lazy: only the AI Assist
    modal touches `Html5Qrcode`, so other pages don't pay any cost.
  -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js" crossorigin></script>

  <!--
    Load order matters: each module attaches its exports onto `window`,
    later files read from `window`. No build step, no bundler.
  -->
  <script type="text/babel" data-presets="env,react" src="./lib/theme.js"></script>
  <script type="text/babel" data-presets="env,react" src="./lib/api.js"></script>
  <script type="text/babel" data-presets="env,react" src="./lib/hooks.js"></script>
  <script type="text/babel" data-presets="env,react" src="./components/Atoms.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./components/AdminShell.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./components/DevPanel.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./components/Toast.jsx"></script>

  <!-- Original 4 pages -->
  <script type="text/babel" data-presets="env,react" src="./pages/Dashboard.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./pages/ProductList.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./pages/ProductDetail.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./pages/ProductCreate.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./pages/UnderConstruction.jsx"></script>

  <!-- 8 new pages added 2026-05-12 for the full 12-page sidebar -->
  <!-- Order matters: Categories registers PlxModal/PlxEmptyState/PlxErrorBanner/PlxPageHead -->
  <!-- which Inventory/PurchaseOrders/etc. consume. -->
  <script type="text/babel" data-presets="env,react" src="./pages/Categories.jsx"></script>
  <!-- Inventory registers PlxKpiTile/PlxChip/formatJpDateTime used by sales+PO -->
  <script type="text/babel" data-presets="env,react" src="./pages/Inventory.jsx"></script>
  <!-- PurchaseOrders registers PlxDetailKV used by Vendors+Branches -->
  <script type="text/babel" data-presets="env,react" src="./pages/PurchaseOrders.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./pages/SalesRecords.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./pages/Vendors.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./pages/Branches.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./pages/Settings.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./pages/Support.jsx"></script>

  <script type="text/babel" data-presets="env,react" src="./app.jsx"></script>
</body>
</html>
