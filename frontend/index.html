<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SCO 商品管理 — paylight X</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;900&display=swap">

  <style>
    /* paylight X — boot-splash tokens only.
       The real token system is `T` in lib/theme.js (navy brand). These CSS
       custom properties exist ONLY for the pre-React boot splash; they must
       mirror the current _LIGHT palette. The old teal brand set
       (--color-primary #1AA68A etc.) was removed 2026-07-15 — it was a stale
       second palette that caused a teal flash before React painted navy. */
    :root {
      --color-text: #002041;         /* = PLX_INK_900 (light) */
      --color-text-muted: #575757;   /* = PLX_INK_500 (light) */
      --color-surface: #F2F3F5;      /* = PLX_SURFACE_50 (light) */
      /* Focus ring color — theme_runtime.js re-sets this per palette so the
         global :focus-visible rule below flips with dark mode. */
      --plx-focus: #0D99FF;

      --font-sans: "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      --font-mono: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    /* WCAG 2.4.7 — the one sanctioned global focus rule. Inline styles can't
       express :focus-visible, so every interactive element gets its visible
       keyboard-focus ring from here; components must never remove an outline
       without this rule still applying. */
    :focus-visible {
      outline: 2px solid var(--plx-focus);
      outline-offset: 2px;
    }
    * { box-sizing: border-box; }
    html, body, #root { height: 100%; margin: 0; }
    /* `theme_runtime.js` overrides body color/background dynamically when
       dark mode toggles. The defaults below are only used during the
       boot splash before React mounts. */
    body {
      font-family: var(--font-sans);
      color: var(--color-text);
      background: var(--color-surface);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      transition: background 0.18s ease, color 0.18s ease;
    }
    /* Dark-mode boot fallback — applied via data-theme="dark" the moment
       theme_runtime.js reads localStorage, before React paints. Avoids a
       white flash on reload when the user has dark mode persisted. */
    html[data-theme="dark"] body {
      color: #ECEEF1;
      background: #0F1419;
    }
    h1, h2, h3, h4 { margin: 0; line-height: 1.3; font-weight: 700; }
    button, input, select, textarea { font-family: inherit; }
    a { color: inherit; }

    @keyframes plxspin {
      from { transform: rotate(0); }
      to { transform: rotate(360deg); }
    }

    /* Loading splash, replaced once React mounts */
    .boot {
      display: flex; align-items: center; justify-content: center;
      height: 100%; color: var(--color-text-muted); font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="root"><div class="boot">読み込み中…</div></div>

  <!-- Boot script: apply persisted theme to <html data-theme> BEFORE any
       React script loads, so dark-mode users don't see a white flash. -->
  <script>
    try {
      var _t = localStorage.getItem("sco.theme.v1");
      if (_t === "dark" || _t === "light") {
        document.documentElement.setAttribute("data-theme", _t);
      }
      var _l = localStorage.getItem("sco.locale.v1");
      if (_l === "ja" || _l === "en") {
        document.documentElement.setAttribute("lang", _l);
      }
    } catch (e) { /* private mode etc. */ }
  </script>

  <!-- React + Babel from CDN (dev builds — fine for PoC) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.7/babel.min.js" crossorigin></script>

  <!--
    Barcode scanner. html5-qrcode supports EAN-13 / JAN-13 / EAN-8 / Code128
    via getUserMedia + a built-in WASM decoder. Lazy: only the AI Assist
    modal touches `Html5Qrcode`, so other pages don't pay any cost.
  -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js" crossorigin></script>

  <!--
    QR code *generator* (desktop⟷phone companion scanner, Option 2). The
    desktop renders a pairing URL as a QR for the phone to open. Distinct from
    html5-qrcode above, which only *reads* codes. Exposes window.QRCode.
  -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" crossorigin></script>

  <!--
    Load order matters: each module attaches its exports onto `window`,
    later files read from `window`. No build step, no bundler.
  -->
  <script type="text/babel" data-presets="env,react" src="./lib/theme.js"></script>
  <!-- theme_runtime.js mutates window.T in place when the user toggles
       dark mode. Components keep referencing T.PLX_* — those names now
       resolve at-render. Must load AFTER theme.js. -->
  <script type="text/babel" data-presets="env,react" src="./lib/theme_runtime.js"></script>
  <!-- i18n: t() helper + EN dictionary + auto-translation of JSX text
       children. Must load BEFORE any component (the auto-translator
       monkey-patches React.createElement). -->
  <script type="text/babel" data-presets="env,react" src="./lib/i18n.js"></script>
  <script type="text/babel" data-presets="env,react" src="./lib/i18n_strings.js"></script>
  <script type="text/babel" data-presets="env,react" src="./lib/i18n_autotr.js"></script>
  <script type="text/babel" data-presets="env,react" src="./lib/api.js"></script>
  <!-- Client-side JAN validation (mirror of backend services/jan.py). Loaded
       before the scanner so it can gate which codes feed the lookup. -->
  <script type="text/babel" data-presets="env,react" src="./lib/jan.js"></script>
  <script type="text/babel" data-presets="env,react" src="./lib/hooks.js"></script>
  <script type="text/babel" data-presets="env,react" src="./lib/recent_searches.js"></script>
  <script type="text/babel" data-presets="env,react" src="./components/Atoms.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./components/AdminShell.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./components/CommandPalette.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./components/DevPanel.jsx"></script>
  <!-- AiArena loads AFTER DevPanel so DevPanel's button can call window.PLX_AI_ARENA -->
  <script type="text/babel" data-presets="env,react" src="./components/AiArena.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./components/Toast.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./components/Tutorial.jsx"></script>

  <!-- Original 4 pages -->
  <script type="text/babel" data-presets="env,react" src="./pages/Dashboard.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./pages/ProductList.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./pages/ProductDetail.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./pages/ProductCreate.jsx"></script>
  <!-- Phone scan page (Option 2). Loads AFTER ProductCreate so it can reuse
       window.BarcodeScanner. -->
  <script type="text/babel" data-presets="env,react" src="./pages/ScanReceiver.jsx"></script>
  <!-- Login page (PoC auth gate in app.jsx) -->
  <script type="text/babel" data-presets="env,react" src="./pages/Login.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./pages/UnderConstruction.jsx"></script>

  <!-- 8 new pages added 2026-05-12 for the full 12-page sidebar -->
  <!-- Order matters: Categories registers PlxModal/PlxEmptyState/PlxErrorBanner/PlxPageHead -->
  <!-- which Inventory/PurchaseOrders/etc. consume. -->
  <script type="text/babel" data-presets="env,react" src="./pages/Categories.jsx"></script>
  <!-- Inventory registers PlxKpiTile/PlxChip/formatJpDateTime used by sales+PO -->
  <script type="text/babel" data-presets="env,react" src="./pages/Inventory.jsx"></script>
  <!-- PurchaseOrders registers PlxDetailKV used by Vendors+Branches -->
  <script type="text/babel" data-presets="env,react" src="./pages/PurchaseOrders.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./pages/SalesRecords.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./pages/ReceiptIssue.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./pages/Vendors.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./pages/Branches.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./pages/Settings.jsx"></script>
  <script type="text/babel" data-presets="env,react" src="./pages/Support.jsx"></script>

  <script type="text/babel" data-presets="env,react" src="./app.jsx"></script>
</body>
</html>
