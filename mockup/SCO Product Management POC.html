<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SCO 商品管理 — paylight X PoC</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background:#f0eee9; }
  body { font-family:"Inter","Noto Sans JP",sans-serif; color:#0F1B2D; }
  .plx-artboard-inner { width:100%; height:100%; display:block; position:relative; overflow:hidden; }
  .plx-artboard-inner > div { height:100%; }
  @keyframes plxshimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tokens.jsx"></script>
<script type="text/babel" src="AppShell.jsx"></script>
<script type="text/babel" src="AdminShell.jsx"></script>
<script type="text/babel" src="mock-data.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="Categories.jsx"></script>
<script type="text/babel" src="Inventory.jsx"></script>
<script type="text/babel" src="PurchaseOrders.jsx"></script>
<script type="text/babel" src="SalesRecords.jsx"></script>
<script type="text/babel" src="Vendors.jsx"></script>
<script type="text/babel" src="Branches.jsx"></script>
<script type="text/babel" src="Settings.jsx"></script>
<script type="text/babel" src="Support.jsx"></script>
<script type="text/babel" src="UnderConstruction.jsx"></script>
<script type="text/babel" src="ProductList.jsx"></script>
<script type="text/babel" src="ProductDetail.jsx"></script>
<script type="text/babel" src="ProductCreate.jsx"></script>
<script type="text/babel" src="ProductListV2.jsx"></script>
<script type="text/babel" src="ProductDetailV2.jsx"></script>
<script type="text/babel" src="ProductCreateV2.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  return (
    <DesignCanvas>
      <DCSection id="core" title="コア画面 (新規)" subtitle="ブリーフ §4 に基づく PaylightX 商品管理 PoC ・ 全 12 ページ">
        <DCArtboard id="dashboard" label="01 · ダッシュボード" width={1440} height={1280}>
          <div className="plx-artboard-inner" data-screen-label="01 ダッシュボード"><Dashboard variant="ready"/></div>
        </DCArtboard>
        <DCArtboard id="dashboard-loading" label="01b · ダッシュボード — ローディング" width={1440} height={1280}>
          <div className="plx-artboard-inner" data-screen-label="01b ローディング"><Dashboard variant="loading"/></div>
        </DCArtboard>
        <DCArtboard id="dashboard-empty" label="01c · ダッシュボード — 健全 / 空" width={1440} height={1280}>
          <div className="plx-artboard-inner" data-screen-label="01c 健全"><Dashboard variant="empty"/></div>
        </DCArtboard>
        <DCArtboard id="categories" label="02 · カテゴリ管理" width={1440} height={1100}>
          <div className="plx-artboard-inner" data-screen-label="02 カテゴリ"><Categories/></div>
        </DCArtboard>
        <DCArtboard id="inventory" label="03 · 在庫" width={1440} height={1500}>
          <div className="plx-artboard-inner" data-screen-label="03 在庫"><Inventory/></div>
        </DCArtboard>
        <DCArtboard id="po-list" label="04 · 発注書 一覧" width={1440} height={1100}>
          <div className="plx-artboard-inner" data-screen-label="04 発注書一覧"><PurchaseOrders/></div>
        </DCArtboard>
        <DCArtboard id="po-detail" label="04b · 発注書 詳細 (PO-2026-0048)" width={1440} height={1280}>
          <div className="plx-artboard-inner" data-screen-label="04b 発注書詳細"><PurchaseOrderDetail/></div>
        </DCArtboard>
        <DCArtboard id="sales" label="05 · 販売記録" width={1440} height={1100}>
          <div className="plx-artboard-inner" data-screen-label="05 販売記録"><SalesRecords/></div>
        </DCArtboard>
        <DCArtboard id="vendors" label="06 · 仕入先" width={1440} height={1000}>
          <div className="plx-artboard-inner" data-screen-label="06 仕入先"><Vendors/></div>
        </DCArtboard>
        <DCArtboard id="branches" label="07 · 院・店舗" width={1440} height={900}>
          <div className="plx-artboard-inner" data-screen-label="07 院店舗"><Branches/></div>
        </DCArtboard>
        <DCArtboard id="settings" label="08 · 設定 (ワイヤーフレーム)" width={1440} height={1500}>
          <div className="plx-artboard-inner" data-screen-label="08 設定"><Settings/></div>
        </DCArtboard>
        <DCArtboard id="support" label="09 · サポート" width={1440} height={1400}>
          <div className="plx-artboard-inner" data-screen-label="09 サポート"><Support/></div>
        </DCArtboard>
        <DCArtboard id="under-construction" label="10 · 開発中プレースホルダ" width={1440} height={900}>
          <div className="plx-artboard-inner" data-screen-label="10 開発中"><UnderConstruction/></div>
        </DCArtboard>
      </DCSection>

      <DCSection id="products" title="商品系画面 (既存)" subtitle="V2 では種別チップ・期限管理・発注先 URL・AI ジャンルコードを反映済み">
        <DCArtboard id="list-v2" label="商品一覧 V2" width={1440} height={1100}>
          <div className="plx-artboard-inner" data-screen-label="商品一覧 V2"><ProductListV2/></div>
        </DCArtboard>
        <DCArtboard id="detail-v2" label="商品詳細 V2" width={1440} height={1180}>
          <div className="plx-artboard-inner" data-screen-label="商品詳細 V2"><ProductDetailV2 productId="p6"/></div>
        </DCArtboard>
        <DCArtboard id="create-v2" label="商品新規 V2 + AI モーダル" width={1440} height={1180}>
          <div className="plx-artboard-inner" data-screen-label="商品新規 V2"><ProductCreateV2/></div>
        </DCArtboard>
      </DCSection>

      <DCSection id="notes" title="デザインノート" subtitle="MD ブリーフ反映の要点">
        <DCPostIt left={40} top={40} width={300}>
          <b>サイドバー = ダークグリーン</b> #0F2A23・アクティブ行は #16A36C パイル + 左 3px の明るい緑ストライプ。PR Times のプロダクト画面に整合。
        </DCPostIt>
        <DCPostIt left={360} top={40} width={300} rotate={1.5}>
          <b>種別の見せ方:</b> 物販品 = 緑チップ、消耗品 = 青チップ。色 + テキストを必ず併記し、視覚障害ユーザにも配慮。
        </DCPostIt>
        <DCPostIt left={680} top={40} width={300} rotate={-1.2}>
          <b>期限管理:</b> 60日超 = 表示なし / 30-60日 = アンバー ⏱ / 30日以下 = 赤。医療UIで赤を多用しないため 3 段階を導入。
        </DCPostIt>
        <DCPostIt left={1000} top={40} width={300} rotate={0.8}>
          <b>AI サマリー:</b> ダッシュボード最上段に自然文 3 行。件数を太字 + 色で強調、現場の声掛けで読める語彙。空状態は労いの一言で締める。
        </DCPostIt>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
