<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SCO Product Management — paylight X POC</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background:#f0eee9; }
  body { font-family: 'Noto Sans JP', sans-serif; color:#1F2937; }
  .plx-artboard-inner { width:100%; height:100%; display:block; position:relative; overflow:hidden; }
  /* Make AdminShell fill its artboard */
  .plx-artboard-inner > div { height:100%; }
  @keyframes plxshimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="AdminShell.jsx"></script>
<script type="text/babel" src="mock-data.jsx"></script>
<script type="text/babel" src="ProductList.jsx"></script>
<script type="text/babel" src="ProductDetail.jsx"></script>
<script type="text/babel" src="ProductCreate.jsx"></script>
<script type="text/babel" src="ProductListV2.jsx"></script>
<script type="text/babel" src="ProductDetailV2.jsx"></script>
<script type="text/babel" src="ProductCreateV2.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>

<script type="text/babel" data-presets="react">
// Clickable hybrid: each artboard hosts its own mini-router so the user can
// click rows, open detail, hit "新しい商品" → AI Assist modal, etc.
function ListArtboard() {
  const [view, setView] = React.useState({ name:"list", productId:null });
  if (view.name==="detail") return <ProductDetail productId={view.productId} onBack={()=>setView({name:"list"})} onEdit={()=>setView({name:"create"})}/>;
  if (view.name==="create") return <ProductCreate onCancel={()=>setView({name:"list"})}/>;
  return <ProductList onOpenProduct={id=>setView({name:"detail",productId:id})} onCreate={()=>setView({name:"create"})}/>;
}

function DetailArtboard() {
  const [view, setView] = React.useState({ name:"detail", productId:"p1" });
  if (view.name==="list") return <ProductList onOpenProduct={id=>setView({name:"detail",productId:id})} onCreate={()=>setView({name:"create"})}/>;
  if (view.name==="create") return <ProductCreate onCancel={()=>setView({name:"detail",productId:view.productId})}/>;
  return <ProductDetail productId={view.productId} onBack={()=>setView({name:"list"})} onEdit={()=>setView({name:"create"})}/>;
}

function CreateArtboard() {
  const [view, setView] = React.useState({ name:"create" });
  if (view.name==="list") return <ProductList onOpenProduct={id=>setView({name:"detail",productId:id})} onCreate={()=>setView({name:"create"})}/>;
  if (view.name==="detail") return <ProductDetail productId={view.productId} onBack={()=>setView({name:"list"})} onEdit={()=>setView({name:"create"})}/>;
  return <ProductCreate onCancel={()=>setView({name:"list"})}/>;
}

/* ────── V2 artboards (new screens per design prompt) ────── */

function ListV2Artboard() {
  const [view, setView] = React.useState({ name:"list", productId:null });
  if (view.name==="detail") return <ProductDetailV2 productId={view.productId} onBack={()=>setView({name:"list"})} onEdit={()=>setView({name:"create"})}/>;
  if (view.name==="create") return <ProductCreateV2 onCancel={()=>setView({name:"list"})}/>;
  return <ProductListV2 onOpenProduct={id=>setView({name:"detail",productId:id})} onCreate={()=>setView({name:"create"})}/>;
}

function DetailV2Artboard() {
  const [view, setView] = React.useState({ name:"detail", productId:"p6" });
  if (view.name==="list") return <ProductListV2 onOpenProduct={id=>setView({name:"detail",productId:id})} onCreate={()=>setView({name:"create"})}/>;
  if (view.name==="create") return <ProductCreateV2 onCancel={()=>setView({name:"detail",productId:view.productId})}/>;
  return <ProductDetailV2 productId={view.productId} onBack={()=>setView({name:"list"})} onEdit={()=>setView({name:"create"})}/>;
}

function CreateV2Artboard() {
  const [view, setView] = React.useState({ name:"create" });
  if (view.name==="list") return <ProductListV2 onOpenProduct={id=>setView({name:"detail",productId:id})} onCreate={()=>setView({name:"create"})}/>;
  if (view.name==="detail") return <ProductDetailV2 productId={view.productId} onBack={()=>setView({name:"list"})} onEdit={()=>setView({name:"create"})}/>;
  return <ProductCreateV2 onCancel={()=>setView({name:"list"})}/>;
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="v2" title="V2 追加スクリーン" subtitle="ダッシュボード + 種別（物販/消耗品）+ 期限管理 + 発注先 URL + AI ジャンルコード対応">
        <DCArtboard id="dashboard" label="01 · ダッシュボード（AI サマリー + KPI + 要対応）" width={1440} height={1180}>
          <div className="plx-artboard-inner" data-screen-label="V2-01 ダッシュボード"><Dashboard variant="ready"/></div>
        </DCArtboard>
        <DCArtboard id="dashboard-loading" label="02 · ダッシュボード — ローディング状態" width={1440} height={1180}>
          <div className="plx-artboard-inner" data-screen-label="V2-02 ダッシュボード ローディング"><Dashboard variant="loading"/></div>
        </DCArtboard>
        <DCArtboard id="dashboard-empty" label="03 · ダッシュボード — 健全 / 空の状態" width={1440} height={1180}>
          <div className="plx-artboard-inner" data-screen-label="V2-03 ダッシュボード 健全"><Dashboard variant="empty"/></div>
        </DCArtboard>
        <DCArtboard id="list-v2" label="04 · 商品一覧 V2（種別フィルタ + 期限表示 + クイックフィルタ）" width={1440} height={1100}>
          <div className="plx-artboard-inner" data-screen-label="V2-04 商品一覧"><ListV2Artboard/></div>
        </DCArtboard>
        <DCArtboard id="detail-v2" label="05 · 商品詳細 V2（消耗品 / 使用期限 / 発注先 URL / ロット履歴）" width={1440} height={1180}>
          <div className="plx-artboard-inner" data-screen-label="V2-05 商品詳細"><DetailV2Artboard/></div>
        </DCArtboard>
        <DCArtboard id="create-v2" label="06 · 商品新規 V2（品目種別トグル + 期限 + AI ジャンルコード）" width={1440} height={1180}>
          <div className="plx-artboard-inner" data-screen-label="V2-06 商品新規"><CreateV2Artboard/></div>
        </DCArtboard>
      </DCSection>

      <DCSection id="primary" title="V1 既存スクリーン" subtitle="paylight X デザイン言語に準拠 · 既存設計の参照用">
        <DCArtboard id="list" label="01 · 商品一覧（フィルタ・検索・タグ）" width={1440} height={1000}>
          <div className="plx-artboard-inner" data-screen-label="01 商品一覧"><ListArtboard/></div>
        </DCArtboard>
        <DCArtboard id="detail" label="02 · 商品詳細（バリアント・在庫履歴・売上）" width={1440} height={1000}>
          <div className="plx-artboard-inner" data-screen-label="02 商品詳細"><DetailArtboard/></div>
        </DCArtboard>
        <DCArtboard id="create" label="03 · 商品の新規追加 + AI アシスト" width={1440} height={1000}>
          <div className="plx-artboard-inner" data-screen-label="03 商品の新規追加"><CreateArtboard/></div>
        </DCArtboard>
      </DCSection>

      <DCSection id="notes" title="デザインノート" subtitle="V2 追加分の設計の考え方">
        <DCPostIt left={40} top={40} width={300}>
          <b>ダッシュボード:</b> 朝イチで開いて <u>「今日やるべきこと」が 5 秒で分かる</u> こと。AI サマリーは自然文 + 太字で件数強調、KPI は 4 つに絞り、下段の「要対応」テーブルは行クリックで該当商品へ。
        </DCPostIt>
        <DCPostIt left={360} top={40} width={300} rotate={1.5}>
          <b>種別の見せ方:</b> 物販 = 緑、消耗品 = 青。色だけに依存せず「物販 / 消耗品」のテキストも常に併記。一覧・詳細・新規すべてで同じピル形状を使い、視線が迷わないように。
        </DCPostIt>
        <DCPostIt left={680} top={40} width={300} rotate={-1.5}>
          <b>期限管理:</b> 60日超 = 表示なし / 60-30日 = アンバー / 30日以下 = 赤 / 過ぎた = 「期限切れ」ピル。医療UIで赤を多用しないよう、アンバーを「予告」に挟む 3 段階。
        </DCPostIt>
        <DCPostIt left={1000} top={40} width={300} rotate={1}>
          <b>AI モーダル v2:</b> ジャンルコード（バーコード）をデフォルトに。📷 カメラボタンは「準備中」グレーアウト。「ジャンルコードの方が精度が高い」と明示し、現場での読み取り運用を想定。
        </DCPostIt>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
