<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claudeを活用した成果物のご紹介 — インタラクティブ版</title>
<style>
  :root{
    --navy:#16233D; --navy2:#22355C; --coral:#C0603A; --coralD:#9E4A2B; --coralL:#F3E6DE;
    --teal:#0F766E; --tealL:#E2F0EE; --text:#1E293B; --muted:#6B7A90;
    --card:#F4F7FB; --card2:#EAF0F7; --line:#D9E2EC; --white:#fff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",system-ui,sans-serif;background:#0d1526;color:var(--text);overflow:hidden}
  #deck{position:fixed;inset:0}
  .slide{position:absolute;inset:0;display:flex;flex-direction:column;padding:4.6vh 5vw 9vh;opacity:0;transform:translateX(40px) scale(.99);transition:opacity .45s ease,transform .45s ease;pointer-events:none;overflow-y:auto;background:var(--white)}
  .slide.active{opacity:1;transform:none;pointer-events:auto;z-index:2}
  .slide.dark{background:var(--navy);color:#fff}
  .slide.dark .sub{color:#9FB0C9}
  .sub{color:var(--muted)}
  .kicker{display:flex;align-items:center;gap:15px;margin-bottom:1.8vh}
  .knum{width:44px;height:44px;border-radius:50%;background:var(--coral);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:19px;flex:none}
  .htitle{font-size:clamp(22px,3.1vw,37px);font-weight:800;line-height:1.14}
  .hsub{font-size:clamp(11px,1.1vw,14px);color:var(--muted);font-weight:500;margin-top:2px}
  .lead{font-size:clamp(14px,1.6vw,20px);font-weight:700;line-height:1.5;max-width:1150px}
  .lead .sub{display:block;font-size:.72em;font-weight:500;margin-top:6px}
  .ic svg{width:1em;height:1em;display:block}
  .est{font-size:11px;color:var(--muted);margin-top:8px}
  .est.d{color:#9FB0C9}
  .title-wrap{margin:auto 0;max-width:1150px}
  .brand{font-size:13px;letter-spacing:2px;color:#AEBDD2;margin-bottom:4.5vh;display:flex;align-items:center;gap:14px}
  .brand .dot{width:44px;height:44px;border-radius:50%;background:var(--coral);display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff}
  .big{font-size:clamp(28px,4.8vw,56px);font-weight:800;line-height:1.12;color:#fff}
  .big .en{display:block;font-size:.42em;font-weight:600;color:#C8D4E6;margin-top:14px}
  .rule{width:120px;height:3px;background:var(--coral);margin:3.6vh 0 2.8vh}
  .who{color:#C8D4E6;font-size:clamp(13px,1.4vw,18px);line-height:1.7}
  .who b{color:#fff;font-size:1.15em}
  .start{margin-top:3.4vh;display:inline-flex;align-items:center;gap:10px;background:var(--coral);color:#fff;border:none;border-radius:30px;padding:14px 28px;font-size:16px;font-weight:800;cursor:pointer;transition:transform .15s,box-shadow .15s;font-family:inherit}
  .start:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(192,96,58,.4)}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:2vh}
  .cap{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 6px 20px rgba(20,40,70,.06);cursor:pointer;transition:transform .18s,box-shadow .18s;border:2px solid transparent}
  .cap:hover{transform:translateY(-3px);box-shadow:0 12px 26px rgba(20,40,70,.12)}
  .cap.open{border-color:var(--coral)}
  .cap .ic{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;margin-bottom:12px}
  .cap h3{font-size:clamp(14px,1.4vw,18px)}
  .cap .sub{font-size:11px;margin-top:2px}
  .cap .more{max-height:0;overflow:hidden;transition:max-height .35s ease;font-size:12.5px;line-height:1.45;color:var(--text)}
  .cap.open .more{max-height:200px;margin-top:10px}
  .cap .tap{font-size:10px;color:var(--coral);font-weight:700;margin-top:8px}
  .cap.open .tap{display:none}
  .band{display:flex;gap:16px;margin-top:2.2vh}
  .note{flex:1;background:var(--card2);border-radius:16px;padding:18px 22px;display:flex;gap:15px;align-items:center}
  .note .ic{width:50px;height:50px;border-radius:50%;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-size:23px;flex:none}
  .note h4{font-size:14px;margin-bottom:4px}
  .note p{font-size:12.5px;line-height:1.45}.note .sub{font-size:11px}
  .statbox{width:280px;background:var(--navy);color:#fff;border-radius:16px;padding:18px 22px;display:flex;flex-direction:column;justify-content:center}
  .statbox .lab{font-size:12px;color:#C8D4E6}
  .statbox .val{font-size:27px;font-weight:800;margin:2px 0}
  .statbox .ex{font-size:14px;font-weight:700;color:var(--coralL);margin-top:5px}
  .statbox .ex .sub{display:block;font-size:10px;font-weight:500}
  .tl{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:.6vh;position:relative}
  .tl::before{content:"";position:absolute;top:66px;left:5%;right:5%;height:3px;background:var(--line)}
  .tlcol{position:relative;padding-top:90px}
  .tldate{position:absolute;top:16px;font-weight:800;color:var(--coral);font-size:clamp(12px,1.2vw,16px)}
  .tlnode{position:absolute;top:55px;left:0;width:24px;height:24px;border-radius:50%;background:#fff;border:4px solid var(--coral);transition:transform .3s,background .2s;cursor:pointer}
  .tlcol.sel .tlnode{background:var(--coral);transform:scale(1.25)}
  .tlcard{background:var(--card);border-radius:14px;padding:16px;box-shadow:0 6px 18px rgba(20,40,70,.06);cursor:pointer;transition:transform .18s,box-shadow .18s;border:2px solid transparent;min-height:112px}
  .tlcard:hover{transform:translateY(-3px)}
  .tlcol.sel .tlcard{border-color:var(--coral)}
  .tlcard h4{font-size:clamp(13px,1.3vw,17px)}
  .tlcard .sub{font-size:11px;margin:2px 0 6px}
  .tlcard .tag{font-size:11.5px;color:var(--teal);font-weight:600}
  .drawer{margin-top:18px;background:var(--card2);border-radius:16px;padding:18px 22px;display:flex;gap:16px;align-items:flex-start;min-height:70px}
  .drawer .ic{width:44px;height:44px;border-radius:50%;background:var(--coral);color:#fff;display:flex;align-items:center;justify-content:center;font-size:19px;flex:none}
  .drawer h4{font-size:14px;margin-bottom:4px}.drawer p{font-size:12.5px;line-height:1.5}.drawer .sub{font-size:11px;margin-top:3px}
  .evo{margin-top:auto;background:var(--navy);border-radius:16px;padding:18px 22px;color:#fff}
  .evo p{font-size:clamp(12px,1.25vw,15px);font-weight:700;margin-bottom:3px}.evo .sub{font-size:11px;color:#9FB0C9}
  .evorow{display:flex;align-items:center;gap:9px;margin-top:13px;flex-wrap:wrap}
  .pill{background:var(--navy2);border-radius:22px;padding:7px 14px;font-size:11.5px;font-weight:700;text-align:center;line-height:1.25}
  .pill .sub{font-size:9px;color:#9FB0C9;font-weight:500}
  .arrow{color:var(--coral);font-weight:900;font-size:17px}
  .rows{display:flex;flex-direction:column;gap:10px;margin-top:1vh}
  .row{background:var(--card);border-radius:14px;padding:14px 20px;box-shadow:0 5px 16px rgba(20,40,70,.05);cursor:pointer;transition:box-shadow .18s;border:2px solid transparent}
  .row:hover{box-shadow:0 10px 22px rgba(20,40,70,.1)}
  .row.open{border-color:var(--teal)}
  .rowhead{display:flex;align-items:center;gap:18px}
  .row .ic{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:21px;color:#fff;flex:none}
  .row .lab{width:250px;flex:none}.row .lab b{font-size:clamp(13px,1.35vw,17px)}.row .lab .sub{font-size:10.5px}
  .row .desc{font-size:clamp(11.5px,1.2vw,14px);line-height:1.4;flex:1}
  .row .chev{color:var(--muted);font-size:18px;transition:transform .3s}
  .row.open .chev{transform:rotate(90deg)}
  .row .more{max-height:0;overflow:hidden;transition:max-height .35s ease;font-size:12.5px;line-height:1.5;color:var(--text)}
  .row.open .more{max-height:160px;margin-top:10px;padding-left:64px}
  .row .more .sub{display:block;margin-top:3px}
  .fx{display:flex;gap:22px;margin-top:1.2vh;flex:1;min-height:0}
  .fxtiles{width:44%;display:grid;grid-template-columns:1fr 1fr;gap:12px;align-content:start}
  .tile{background:var(--card);border-radius:14px;padding:15px;cursor:pointer;transition:transform .16s,box-shadow .16s;border:2px solid transparent;display:flex;gap:12px;align-items:center}
  .tile:hover{transform:translateY(-2px);box-shadow:0 10px 22px rgba(20,40,70,.12)}
  .tile.on{border-color:var(--coral);background:#fff;box-shadow:0 10px 24px rgba(20,40,70,.14)}
  .tile .ic{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;color:#fff;flex:none}
  .tile b{font-size:13.5px;display:block}.tile .sub{font-size:10px}
  .fxdetail{flex:1;background:linear-gradient(160deg,#1b2b4a,#16233D);color:#fff;border-radius:20px;padding:28px 30px;display:flex;flex-direction:column}
  .fxdetail .dic{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;margin-bottom:14px}
  .fxdetail h3{font-size:clamp(18px,2vw,26px);font-weight:800}
  .fxdetail .den{font-size:13px;color:#9FB0C9;margin-bottom:14px}
  .fxdetail .lbl{font-size:11px;font-weight:800;letter-spacing:1px;color:var(--coralL);margin:12px 0 4px}
  .fxdetail p{font-size:clamp(13px,1.35vw,16px);line-height:1.55}.fxdetail p .sub{display:block;font-size:.82em;color:#9FB0C9;margin-top:3px}
  .fxhint{font-size:11px;color:var(--muted);margin-top:10px}
  .dcols{display:flex;gap:20px;margin-top:1.2vh;flex:1;min-height:0}
  .dleft{flex:1.05;display:flex;flex-direction:column;gap:14px}
  .dcard{background:var(--card);border-radius:16px;padding:18px 20px;box-shadow:0 6px 18px rgba(20,40,70,.06)}
  .dcard .tag{display:flex;align-items:center;gap:10px;font-weight:800;font-size:12.5px;margin-bottom:7px}
  .dcard .tag .ic{width:36px;height:36px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px}
  .dcard p{font-size:clamp(12.5px,1.3vw,15px);line-height:1.5}.dcard p .sub{display:block;font-size:.8em;margin-top:4px}
  .tech{font-size:11.5px;color:var(--muted);margin-top:4px}.tech b{color:var(--teal)}
  .dright{flex:1;display:flex;flex-direction:column}
  .dright .rh{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
  .dright h4{font-size:13.5px;font-weight:800}
  .replay{display:inline-flex;align-items:center;gap:6px;background:var(--coralL);color:var(--coralD);border:none;border-radius:20px;padding:7px 14px;font-size:11.5px;font-weight:800;cursor:pointer;font-family:inherit;transition:background .15s}
  .replay:hover{background:#ecd6c9}.replay .ic{font-size:13px;display:flex}
  .ts{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px 20px;box-shadow:0 8px 22px rgba(20,40,70,.07)}
  .ts .tstitle{font-size:12.5px;font-weight:700}.ts .tstitle .sub{color:var(--muted);font-weight:500}
  .tsbar{margin-top:12px}
  .tsbar .cap{display:flex;justify-content:space-between;align-items:baseline;font-size:12.5px;font-weight:700;margin-bottom:5px}
  .tsbar .cap .n{font-variant-numeric:tabular-nums}
  .track{height:18px;border-radius:10px;background:#EDF1F7;overflow:hidden}
  .fill{height:100%;width:0;border-radius:10px;transition:width 1s cubic-bezier(.2,.8,.2,1)}
  .fill.manual{background:linear-gradient(90deg,#94A3B8,#64748B)}
  .fill.claude{background:linear-gradient(90deg,#C0603A,#9E4A2B)}
  .saved{margin-top:14px;background:var(--coralL);border-radius:14px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;opacity:0;transform:translateY(8px);transition:opacity .5s,transform .5s}
  .saved.show{opacity:1;transform:none}
  .saved .lab{font-size:13px;font-weight:800;color:var(--coral)}.saved .lab .sub{display:block;font-size:10.5px;font-weight:600;color:var(--coralD)}
  .saved .big{font-size:clamp(24px,2.8vw,36px);font-weight:800;color:var(--coral);font-variant-numeric:tabular-nums}
  .saved .pct{font-size:13px;font-weight:700;color:var(--coralD);margin-left:6px}
  .chips{display:flex;gap:9px;margin-top:12px;flex-wrap:wrap}
  .chip{background:var(--tealL);color:#0b5b54;border-radius:10px;padding:7px 11px;font-size:11.5px;font-weight:700;line-height:1.3}
  .chip .sub{display:block;font-size:9.5px;font-weight:600;color:var(--teal)}
  .tsfoot{font-size:11px;color:var(--muted);margin-top:9px;line-height:1.4}
  .sumwrap{display:flex;gap:28px;flex:1;min-height:0;margin-top:1vh}
  .sumleft{flex:1.2;display:flex;flex-direction:column;justify-content:center}
  .vp{display:flex;align-items:center;gap:13px;margin:8px 0}
  .vp .ic{width:42px;height:42px;border-radius:50%;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;flex:none}
  .vp b{font-size:clamp(14px,1.45vw,18px)}.vp .sub{font-size:11.5px}
  .sumstat{width:330px;background:var(--navy2);border-radius:20px;padding:30px;display:flex;flex-direction:column;justify-content:center;align-self:center;text-align:center}
  .sumstat .lab{color:#C8D4E6;font-size:14px}
  .sumstat .total{font-size:clamp(46px,7vw,74px);font-weight:800;color:#fff;line-height:1;font-variant-numeric:tabular-nums}
  .sumstat .tu{font-size:20px;font-weight:800;color:#fff}
  .sumstat .ex{color:var(--coralL);font-weight:700;font-size:15px;margin-top:12px;border-top:1px solid #34496E;padding-top:12px}
  .sumstat .ex .sub{display:block;font-size:11px;font-weight:500;color:#9FB0C9}
  .sumstat .replay{margin:14px auto 0;background:rgba(255,255,255,.14);color:#fff}
  .sumstat .replay:hover{background:rgba(255,255,255,.24)}
  #bar{position:fixed;top:0;left:0;height:4px;background:var(--coral);z-index:50;transition:width .4s;width:0}
  #ctrl{position:fixed;bottom:16px;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:14px;z-index:50}
  .btn{width:42px;height:42px;border-radius:50%;border:none;background:rgba(255,255,255,.9);color:var(--navy);font-size:17px;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.2);transition:transform .15s,background .15s}
  .btn:hover{transform:scale(1.08);background:#fff}.btn:active{transform:scale(.94)}
  .dots{display:flex;gap:7px;align-items:center}
  .dot-i{width:8px;height:8px;border-radius:50%;background:rgba(150,160,180,.5);cursor:pointer;transition:all .2s;border:none;padding:0}
  .dot-i.on{background:var(--coral);width:24px;border-radius:5px}
  #counter{position:fixed;bottom:22px;right:22px;color:rgba(120,135,160,.8);font-size:12px;font-weight:700;z-index:50;font-variant-numeric:tabular-nums}
  .hint{position:fixed;top:12px;right:16px;color:rgba(120,135,160,.7);font-size:11px;z-index:50}
  @media (max-width:860px){
    .grid4{grid-template-columns:repeat(2,1fr)}.tl{grid-template-columns:repeat(2,1fr)}.tl::before{display:none}
    .tlcol{padding-top:8px}.tlnode{position:static;margin-bottom:6px}.tldate{position:static;display:block;margin-bottom:4px}
    .band,.dcols,.sumwrap,.fx{flex-direction:column}.statbox,.sumstat,.fxtiles{width:auto}.fxtiles{grid-template-columns:1fr 1fr}
    .row .lab{width:auto}.rowhead{flex-wrap:wrap}
  }
</style>
</head>
<body>
<div id="bar"></div>
<div id="deck"></div>
<div class="hint">← →・ボタンでページ移動　｜　カード／タイル／行をクリックで詳細（click cards・tiles・rows for details）</div>
<div id="ctrl"><button class="btn" id="prev">‹</button><div class="dots" id="dots"></div><button class="btn" id="next">›</button></div>
<div id="counter"></div>
<script>
const CO="#C0603A",TE="#0F766E";
const P={
 chart:'<line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/>',

function icon(n){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+(P[n]||'')+'</svg>'}

function countTo(node,to,dur,dec,suffix){const st=performance.now();suffix=suffix||'';
 function step(t){const p=Math.min((t-st)/dur,1),e=1-Math.pow(1-p,3),v=to*e;
  node.textContent=(dec?v.toFixed(1):Math.round(v))+suffix;if(p<1)requestAnimationFrame(step);else node.textContent=(dec?to.toFixed(1):Math.round(to))+suffix;}
 requestAnimationFrame(step);}
function playTS(ts){
 const manual=+ts.dataset.manual,claude=+ts.dataset.claude,unit=ts.dataset.unit;
 const saved=Math.round((manual-claude)*10)/10,pct=Math.round((manual-claude)/manual*100);
 const mF=ts.querySelector('.fill.manual'),cF=ts.querySelector('.fill.claude');
 const nm=ts.querySelector('.nm'),nc=ts.querySelector('.nc'),ns=ts.querySelector('.ns');
 const box=ts.querySelector('.saved'),pctEl=ts.querySelector('.pct');
 const dec=(manual%1)||(claude%1);
 mF.style.width='0';cF.style.width='0';box.classList.remove('show');
 nm.textContent='0';nc.textContent='0';ns.textContent='0';pctEl.textContent='(-0%)';
 clearTimeout(ts._t1);clearTimeout(ts._t2);clearTimeout(ts._t3);
 ts._t1=setTimeout(()=>{mF.style.width='100%';countTo(nm,manual,850,dec,unit)},250);
 ts._t2=setTimeout(()=>{cF.style.width=(claude/manual*100)+'%';countTo(nc,claude,850,dec,unit)},1200);
 ts._t3=setTimeout(()=>{box.classList.add('show');countTo(ns,saved,850,dec,unit);setTimeout(()=>pctEl.textContent='(-'+pct+'%)',870)},2250);
}
function playTotal(slide){const el=slide.querySelector('#totNum');if(!el)return;
 const total=DELV.reduce((a,d)=>a+(d.ts.manual-d.ts.claude),0);
 el.textContent='0';setTimeout(()=>countTo(el,total,1100,(total%1)!==0),300);}
function renderFX(slide,key,idx){const F=key==='featA'?FEAT_A:FEAT_B,it=F.items[idx];
 const d=slide.querySelector('#fxd-'+key);
 d.innerHTML='<div class="dic" style="background:'+it[1]+'">'+icon(it[0])+'</div><h3>'+it[2]+'</h3><div class="den">'+it[3]+'</div><div class="lbl">この機能でできること / WHAT IT DOES</div><p>'+it[4]+'<span class="sub">'+it[5]+'</span></p><div class="lbl">私の活用例 / HOW I USED IT</div><p>'+it[6]+'<span class="sub">'+it[7]+'</span></p><div class="fxhint">他のタイルをタップして切り替え / tap another tile to switch</div>';
 slide.querySelectorAll('.tile').forEach((t,i)=>t.classList.toggle('on',i===idx));
 slide._fx=idx;}
function renderDrawer(slide,idx){const m=MS[idx];const dr=slide.querySelector('#tlDraw');
 dr.innerHTML='<div class="ic">'+icon(m[4])+'</div><div><h4>'+m[0]+' — '+m[1]+'</h4><p>'+m[5]+'</p><p class="sub">'+m[6]+'</p></div>';
 slide.querySelectorAll('.tlcol').forEach((c,i)=>c.classList.toggle('sel',i===idx));}
function activate(slide){
 slide.querySelectorAll('.ts').forEach(playTS);
 if(slide.querySelector('#totNum'))playTotal(slide);
 const feat=slide.dataset.feat;if(feat)renderFX(slide,feat,slide._fx||0);
 const dr=slide.querySelector('#tlDraw');if(dr&&!dr.dataset.init){renderDrawer(slide,0);dr.dataset.init='1';}}
deck.addEventListener('click',e=>{
 const cap=e.target.closest('.cap');if(cap){cap.classList.toggle('open');return;}
 const row=e.target.closest('.row');if(row){row.classList.toggle('open');return;}
 const tile=e.target.closest('.tile');if(tile){const sl=tile.closest('.slide');renderFX(sl,sl.dataset.feat,+tile.dataset.tile);return;}
 const tcard=e.target.closest('.tlcol');if(tcard){renderDrawer(tcard.closest('.slide'),+tcard.dataset.ms);return;}
 const rep=e.target.closest('[data-replay]');if(rep){playTS(rep.closest('.dright').querySelector('.ts'));return;}
 const tot=e.target.closest('[data-tot]');if(tot){playTotal(tot.closest('.slide'));return;}
 const sb=e.target.closest('#startBtn');if(sb){go(1);return;}
});
let cur=0;
function go(i){if(i<0||i>=nodes.length)return;nodes[cur].classList.remove('active');cur=i;nodes[cur].classList.add('active');
 dots.forEach((d,k)=>d.classList.toggle('on',k===cur));
 document.getElementById('bar').style.width=((cur+1)/nodes.length*100)+'%';
 document.getElementById('counter').textContent=(cur+1)+' / '+nodes.length;
 nodes[cur].scrollTop=0;activate(nodes[cur]);}
document.getElementById('next').onclick=e=>{e.stopPropagation();go(cur+1)};
document.getElementById('prev').onclick=e=>{e.stopPropagation();go(cur-1)};
document.addEventListener('keydown',e=>{
 if(['ArrowRight',' ','PageDown'].includes(e.key)){e.preventDefault();go(cur+1)}
 if(['ArrowLeft','PageUp'].includes(e.key)){e.preventDefault();go(cur-1)}
 if(e.key==='Home')go(0);if(e.key==='End')go(nodes.length-1)});
let sx=0;deck.addEventListener('touchstart',e=>sx=e.touches[0].clientX,{passive:true});
deck.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>60)go(cur+(dx<0?1:-1))});
go(0);
</script>
</body>
